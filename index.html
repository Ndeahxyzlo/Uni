<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kvmily</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: #faf9f7;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 40px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e8e4df;
    }

    .logo {
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      font-weight: normal;
      text-transform: uppercase;
    }

    nav a {
      text-decoration: none;
      color: #2c2c2c;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: 32px;
    }

    nav a:hover {
      opacity: 0.5;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 60px;
    }

    .hero h1 {
      font-size: 5rem;
      letter-spacing: 0.2em;
      font-weight: normal;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    .hero p {
      margin-top: 20px;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #888;
    }

    footer {
      padding: 30px 60px;
      text-align: center;
      border-top: 1px solid #e8e4df;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Kvmily</div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Nosotros</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <h1>Kvmily</h1>
      <p>— coming soon —</p>
    </div>
  </main>

  <footer>
    &copy; 2026 Kvmily. Todos los derechos reservados.
  </footer>

</body>
</html>
